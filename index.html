<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Universal AI Chat</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html, body {
  height: 100%;
}

#app {
  display: none;
}

.typing::after {
  content: "▋";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0;}
}
</style>
</head>

<body class="bg-gray-100 text-gray-900 dark:bg-[#1e1f20] dark:text-white">

<!-- LOADER -->
<div id="loading" class="flex items-center justify-center h-screen text-lg">
  Loading App...
</div>

<!-- APP -->
<div id="app" class="min-h-screen flex">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="w-64 bg-white dark:bg-[#2a2b2d] border-r hidden md:flex flex-col">
    <div class="p-4 border-b flex justify-between">
      <button id="newChatBtn" class="text-sm bg-blue-500 text-white px-3 py-1 rounded">New Chat</button>
      <button id="settingsBtn">⚙️</button>
    </div>
    <div id="chatList" class="flex-1 overflow-y-auto"></div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col">

    <!-- HEADER -->
    <div class="p-3 flex items-center justify-between border-b bg-white dark:bg-[#2a2b2d]">
      <button id="menuBtn" class="md:hidden">☰</button>
      <div>Universal AI</div>
      <button id="darkToggle">🌙</button>
    </div>

    <!-- CHAT -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <!-- INPUT -->
    <div class="p-3 bg-white dark:bg-[#2a2b2d] border-t">
      <div class="flex gap-2">
        <textarea id="input" rows="1" class="flex-1 p-2 border rounded resize-none"></textarea>
        <button id="sendBtn" class="bg-blue-500 text-white px-4 rounded">Send</button>
      </div>
    </div>

  </main>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
  <div class="bg-white dark:bg-[#2a2b2d] p-4 rounded w-80 space-y-3">
    <h2 class="text-lg font-bold">Settings</h2>

    <input id="apiKey" type="password" placeholder="OpenRouter API Key" class="w-full p-2 border rounded">
    <input id="model" placeholder="Model (default: deepseek/deepseek-r1:free)" class="w-full p-2 border rounded">

    <textarea id="systemPrompt" placeholder="System Prompt" class="w-full p-2 border rounded"></textarea>

    <button id="saveSettings" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Save</button>
  </div>
</div>

<script>
/* =========================
   INITIALIZE SAFE
========================= */
const loading = document.getElementById("loading");
const app = document.getElementById("app");

try {

/* =========================
   STATE
========================= */
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChatId = null;

/* =========================
   ELEMENTS
========================= */
const chatList = document.getElementById("chatList");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");

/* =========================
   UTIL
========================= */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function createChat() {
  const chat = {
    id: Date.now(),
    name: "New Chat",
    messages: []
  };
  chats.unshift(chat);
  currentChatId = chat.id;
  save();
  renderChats();
  renderMessages();
}

function getCurrentChat() {
  return chats.find(c => c.id === currentChatId);
}

/* =========================
   RENDER
========================= */
function renderChats() {
  chatList.innerHTML = "";
  chats.forEach(chat => {
    const div = document.createElement("div");
    div.className = "p-3 cursor-pointer border-b hover:bg-gray-200 dark:hover:bg-gray-700";
    div.innerText = chat.name;

    div.onclick = () => {
      currentChatId = chat.id;
      renderMessages();
    };

    chatList.appendChild(div);
  });
}

function renderMessages() {
  const chat = getCurrentChat();
  if (!chat) return;

  messagesDiv.innerHTML = "";

  chat.messages.forEach(msg => {
    const div = document.createElement("div");

    div.className = msg.role === "user"
      ? "text-right"
      : "text-left";

    const bubble = document.createElement("div");
    bubble.className = "inline-block p-3 rounded max-w-[80%] " +
      (msg.role === "user"
        ? "bg-blue-500 text-white"
        : "bg-gray-200 dark:bg-gray-700");

    bubble.innerHTML = marked.parse(msg.content);

    div.appendChild(bubble);
    messagesDiv.appendChild(div);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* =========================
   SEND MESSAGE + STREAM
========================= */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const chat = getCurrentChat();
  if (!chat) return;

  chat.messages.push({ role: "user", content: text });
  input.value = "";
  renderMessages();

  const aiMsg = { role: "assistant", content: "" };
  chat.messages.push(aiMsg);
  renderMessages();

  const apiKey = localStorage.getItem("apiKey");
  const model = localStorage.getItem("model") || "deepseek/deepseek-r1:free";
  const systemPrompt = localStorage.getItem("systemPrompt") || "";

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model,
        stream: true,
        messages: [
          { role: "system", content: systemPrompt },
          ...chat.messages
        ]
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value);

      const parts = buffer.split("\n");
      buffer = parts.pop();

      parts.forEach(line => {
        if (line.startsWith("data: ")) {
          const data = line.replace("data: ", "");
          if (data === "[DONE]") return;

          try {
            const json = JSON.parse(data);
            const token = json.choices?.[0]?.delta?.content;

            if (token) {
              aiMsg.content += token;
              renderMessages();
            }
          } catch {}
        }
      });
    }

    save();

  } catch (err) {
    aiMsg.content = "Error: " + err.message;
    renderMessages();
  }
}

/* =========================
   EVENTS
========================= */
document.getElementById("sendBtn").onclick = sendMessage;

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("newChatBtn").onclick = createChat;

/* =========================
   SETTINGS
========================= */
const modal = document.getElementById("settingsModal");

document.getElementById("settingsBtn").onclick = () => {
  modal.classList.remove("hidden");
};

document.getElementById("saveSettings").onclick = () => {
  localStorage.setItem("apiKey", document.getElementById("apiKey").value);
  localStorage.setItem("model", document.getElementById("model").value);
  localStorage.setItem("systemPrompt", document.getElementById("systemPrompt").value);
  modal.classList.add("hidden");
};

/* =========================
   DARK MODE
========================= */
const darkToggle = document.getElementById("darkToggle");

function applyTheme() {
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark");
  } else {
    document.documentElement.classList.remove("dark");
  }
}

darkToggle.onclick = () => {
  const current = localStorage.getItem("theme");
  localStorage.setItem("theme", current === "dark" ? "light" : "dark");
  applyTheme();
};

applyTheme();

/* =========================
   MOBILE SIDEBAR
========================= */
const sidebar = document.getElementById("sidebar");
document.getElementById("menuBtn").onclick = () => {
  sidebar.classList.toggle("hidden");
};

/* =========================
   INIT
========================= */
if (chats.length === 0) createChat();
else currentChatId = chats[0].id;

renderChats();
renderMessages();

/* =========================
   SHOW APP
========================= */
loading.style.display = "none";
app.style.display = "flex";

} catch (e) {
  loading.innerText = "Failed to load app.";
}
</script>

</body>
</html>
